<!DOCTYPE html>
<html lang="en">
<head>
    <title>Socket.IO Test Client</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
    <h2>Real-Time Notifications Log</h2>
    <div id="messages" style="background: #f4f4f4; padding: 10px; border-radius: 5px; min-height: 200px;">
        <p style="color: gray;">Waiting for events...</p>
    </div>

    <script>
        // Connect to your Node.js microservice
        const socket = io('http://localhost:5000');

        const messageDiv = document.getElementById('messages');

        // Helper function to print messages to the screen
        function logEvent(eventName, data) {
            const p = document.createElement('p');
            p.innerHTML = `<strong>[${eventName}]</strong>: ${JSON.stringify(data)}`;
            messageDiv.prepend(p);
        }

        // Listen for connection success
        socket.on('connect', () => {
            logEvent('System', 'Connected to server with ID: ' + socket.id);
        });

        // Listen for your 5 custom events
        socket.on('taskAssigned', (data) => logEvent('taskAssigned', data));
        socket.on('taskStatusUpdated', (data) => logEvent('taskStatusUpdated', data));
        socket.on('managerFeedbackAdded', (data) => logEvent('managerFeedbackAdded', data));
        socket.on('predictionGenerated', (data) => logEvent('predictionGenerated', data));
        socket.on('sprintDeadlineAlert', (data) => logEvent('sprintDeadlineAlert', data));
    </script>
</body>
</html>
